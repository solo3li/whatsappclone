name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore server/WhatsappClone.sln

      - name: Build
        run: dotnet build server/WhatsappClone.sln --configuration Release --no-restore

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/whatsapp-clone-backend:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 47.84.69.17
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/whatsapp-clone-backend:latest
            docker stop whatsapp-backend || true
            docker rm whatsapp-backend || true
            docker run -d \
              --name whatsapp-backend \
              -p 8080:8080 \
              -e HOST_MAIL="${{ secrets.HOST_MAIL }}" \
              -e HOST_MAIL_PASS="${{ secrets.HOST_MAIL_PASS }}" \
              -e ConnectionStrings__DefaultConnection="Data Source=/app/data/whatsapp.db" \
              -v /root/whatsapp-data:/app/data \
              ${{ secrets.DOCKER_USERNAME }}/whatsapp-clone-backend:latest
