name: Backend CI/CD (Production)

on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/whatsapp-clone-backend
  CONTAINER_NAME: whatsapp-backend
  PORT_MAPPING: 8080:8080

jobs:
  # --- Phase 1: Build & Verify ---
  build:
    name: Build & Artifact Creation
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: server/WhatsappClone.slnx

      - name: 📦 Restore Dependencies
        run: dotnet restore server/WhatsappClone.slnx

      - name: 🔨 Build Solution (Release)
        run: dotnet build server/WhatsappClone.slnx --configuration Release --no-restore

      - name: 🐋 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}

  # --- Phase 2: Secure Deployment ---
  deploy:
    name: Secure VPS Deployment
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.84.69.17
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "--- Starting Deployment [${{ github.sha }}] ---"
            
            # 1. Pull latest image
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            
            # 2. Stop and remove existing container (if exists)
            if [ "$(docker ps -aq -f name=${{ env.CONTAINER_NAME }})" ]; then
                echo "Stopping and removing existing container..."
                docker rm -f ${{ env.CONTAINER_NAME }}
            fi
            
            # 3. Run new container with Health Checks
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart always \
              -p ${{ env.PORT_MAPPING }} \
              -e HOST_MAIL="${{ secrets.HOST_MAIL }}" \
              -e HOST_MAIL_PASS="${{ secrets.HOST_MAIL_PASS }}" \
              -e ConnectionStrings__DefaultConnection="Data Source=/app/data/whatsapp.db" \
              -v /root/whatsapp-data:/app/data \
              --health-cmd="curl --fail http://localhost:8080/api/Admin/stats || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=3 \
              ${{ env.DOCKER_IMAGE }}:latest
            
            # 4. Wait for health status
            echo "Waiting for container to become healthy..."
            sleep 10
            HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }})
            echo "Health status: $HEALTH_STATUS"
            
            # 5. Cleanup: Remove dangling images to save disk space
            docker image prune -f
            
            echo "--- Deployment Complete ---"
